name: sysml-railroad-diagram

on:
  schedule:
    - cron: '0 6 * * 1'   # wöchentlich, montags 06:00 UTC
  workflow_dispatch:        # manuelles Auslösen zum Testen

permissions:
  contents: write   # zum Committen der last_sha.txt
  pages: write       # zum Veröffentlichen auf GitHub Pages
  id-token: write    # von deploy-pages benötigt

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Letzten bekannten Commit lesen
        id: last
        run: echo "sha=$(cat last_sha.txt 2>/dev/null || echo none)" >> "$GITHUB_OUTPUT"

      - name: Aktuellen Commit der Grammatik abfragen
        id: current
        run: |
          response=$(curl -s "https://api.github.com/repos/antlr/grammars-v4/commits?path=sysml-v2&sha=master&per_page=1")
          sha=$(echo "$response" | jq -r '.[0].sha')
          date=$(echo "$response" | jq -r '.[0].commit.committer.date')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "date=$date" >> "$GITHUB_OUTPUT"

      - name: Vergleichen
        id: compare
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.current.outputs.sha }}" != "${{ steps.last.outputs.sha }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Java einrichten
        if: steps.compare.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Aktuelle Versionen von ebnf-convert und rr ermitteln
        if: steps.compare.outputs.changed == 'true'
        id: tool_versions
        run: |
          ec_version=$(curl -s https://repo1.maven.org/maven2/de/bottlecaps/ebnf-convert/ebnf-convert-webapp/maven-metadata.xml | grep -oPm1 '(?<=<release>)[^<]+')
          rr_version=$(curl -s https://repo1.maven.org/maven2/de/bottlecaps/rr/rr-webapp/maven-metadata.xml | grep -oPm1 '(?<=<release>)[^<]+')
          echo "ec_version=$ec_version" >> "$GITHUB_OUTPUT"
          echo "rr_version=$rr_version" >> "$GITHUB_OUTPUT"

      - name: Tool-Downloads aus Cache wiederherstellen
        if: steps.compare.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: tools
          key: bottlecaps-tools-${{ steps.tool_versions.outputs.ec_version }}-${{ steps.tool_versions.outputs.rr_version }}

      - name: ebnf-convert.war und rr.war herunterladen (falls nicht im Cache)
        if: steps.compare.outputs.changed == 'true'
        run: |
          mkdir -p tools
          ec=tools/ebnf-convert-${{ steps.tool_versions.outputs.ec_version }}.war
          rr=tools/rr-${{ steps.tool_versions.outputs.rr_version }}.war
          [ -f "$ec" ] || curl -sfL -o "$ec" \
            "https://repo1.maven.org/maven2/de/bottlecaps/ebnf-convert/ebnf-convert-webapp/${{ steps.tool_versions.outputs.ec_version }}/ebnf-convert-webapp-${{ steps.tool_versions.outputs.ec_version }}.war"
          [ -f "$rr" ] || curl -sfL -o "$rr" \
            "https://repo1.maven.org/maven2/de/bottlecaps/rr/rr-webapp/${{ steps.tool_versions.outputs.rr_version }}/rr-webapp-${{ steps.tool_versions.outputs.rr_version }}.war"
          ln -sf "$(basename "$ec")" tools/ebnf-convert.war
          ln -sf "$(basename "$rr")" tools/rr.war

      - name: SysML-v2-Grammatik herunterladen
        if: steps.compare.outputs.changed == 'true'
        run: |
          mkdir -p grammar
          curl -sf -o grammar/SysMLv2Lexer.g4 \
            "https://raw.githubusercontent.com/antlr/grammars-v4/${{ steps.current.outputs.sha }}/sysml-v2/SysMLv2Lexer.g4"
          curl -sf -o grammar/SysMLv2Parser.g4 \
            "https://raw.githubusercontent.com/antlr/grammars-v4/${{ steps.current.outputs.sha }}/sysml-v2/SysMLv2Parser.g4"

      - name: Grammatik zusammenführen und Railroad-Diagramm erzeugen
        if: steps.compare.outputs.changed == 'true'
        run: |
          cd grammar
          mkdir -p ../site

          # Grammatik-Header entfernen, damit aus Lexer- und Parser-Datei eine
          # kombinierte ANTLR4-Grammatik wird (Regel-Referenzen bleiben dadurch verlinkt)
          sed -i -E '/^(lexer |parser )?grammar [A-Za-z0-9_]+;$/d' SysMLv2Parser.g4
          sed -i -E '/^(lexer |parser )?grammar [A-Za-z0-9_]+;$/d' SysMLv2Lexer.g4
          # der tokenVocab-Options-Block ist in einer kombinierten Grammatik überflüssig
          perl -0777 -pi -e 's/options\s*\{[^}]*\}//s' SysMLv2Parser.g4

          {
            echo 'grammar SysMLv2;'
            cat SysMLv2Parser.g4
            cat SysMLv2Lexer.g4
          } > SysMLv2Combined.g4

          java -jar ../tools/ebnf-convert.war SysMLv2Combined.g4 > combined.ebnf
          java -jar ../tools/rr.war -html -suppressebnf -color:#7B83DF -out:"../site/SysML2-textual notation.html" combined.ebnf

      - name: Datum der Quelldatei oben rechts einfügen
        if: steps.compare.outputs.changed == 'true'
        run: |
          readable_date=$(LC_TIME=C date -u -d "${{ steps.current.outputs.date }}" +"%B %Y")
          info="<div style=\"text-align:right;margin-bottom:1em;font-family:sans-serif;font-size:0.85em;color:#666;\">Status: ${readable_date}</div>"
          sed -i "0,/<body[^>]*>/s##&${info}#" "site/SysML2-textual notation.html"

      - name: last_sha.txt aktualisieren und committen
        if: steps.compare.outputs.changed == 'true'
        run: |
          echo "${{ steps.current.outputs.sha }}" > last_sha.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_sha.txt
          git diff --staged --quiet || git commit -m "Update SysML v2 grammar snapshot to ${{ steps.current.outputs.sha }}"
          git push

      - name: Pages vorbereiten
        if: steps.compare.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Artefakt hochladen
        if: steps.compare.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: needs.check-and-build.outputs.changed == 'true'
    needs: check-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
