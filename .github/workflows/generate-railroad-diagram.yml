name: sysml-railroad-diagram

on:
  schedule:
    - cron: '0 6 * * 1'   # wöchentlich, montags 06:00 UTC
  workflow_dispatch:        # manuelles Auslösen zum Testen

permissions:
  contents: write   # zum Committen des last_spec_hash.txt
  pages: write       # zum Veröffentlichen auf GitHub Pages
  id-token: write    # von deploy-pages benötigt

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Letzten bekannten Spec-Hash lesen
        id: last
        run: echo "hash=$(cat last_spec_hash.txt 2>/dev/null || echo none)" >> "$GITHUB_OUTPUT"

      - name: Aktuelle Version von kebnf ermitteln
        id: kebnf_version
        run: |
          response=$(curl -s -A "oose-sysml-railroad-diagram-workflow (github.com/oose/SysML-2-Utilities)" https://crates.io/api/v1/crates/nomograph-kebnf)
          version=$(echo "$response" | jq -r '.crate.newest_version')
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Konnte Version nicht ermitteln, Antwort von crates.io:"
            echo "$response"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: kebnf aus Cache wiederherstellen
        id: kebnf_cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/kebnf
          key: kebnf-${{ steps.kebnf_version.outputs.version }}

      - name: kebnf installieren (falls nicht im Cache)
        if: steps.kebnf_cache.outputs.cache-hit != 'true'
        run: cargo install nomograph-kebnf --version ${{ steps.kebnf_version.outputs.version }}

      - name: Aktuelle KerML/SysML-v2-Spec holen
        id: fetch
        run: |
          kebnf --fetch-spec
          current_hash=$(find ~/.cache/kebnf -type f -name '*.kebnf' | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)
          echo "hash=$current_hash" >> "$GITHUB_OUTPUT"

      - name: Vergleichen
        id: compare
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.fetch.outputs.hash }}" != "${{ steps.last.outputs.hash }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Java einrichten
        if: steps.compare.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Aktuelle Versionen von ebnf-convert und rr ermitteln
        if: steps.compare.outputs.changed == 'true'
        id: tool_versions
        run: |
          ec_version=$(curl -s https://repo1.maven.org/maven2/de/bottlecaps/ebnf-convert/ebnf-convert-webapp/maven-metadata.xml | grep -oPm1 '(?<=<release>)[^<]+')
          rr_version=$(curl -s https://repo1.maven.org/maven2/de/bottlecaps/rr/rr-webapp/maven-metadata.xml | grep -oPm1 '(?<=<release>)[^<]+')
          echo "ec_version=$ec_version" >> "$GITHUB_OUTPUT"
          echo "rr_version=$rr_version" >> "$GITHUB_OUTPUT"

      - name: Tool-Downloads aus Cache wiederherstellen
        if: steps.compare.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: tools
          key: bottlecaps-tools-${{ steps.tool_versions.outputs.ec_version }}-${{ steps.tool_versions.outputs.rr_version }}

      - name: ebnf-convert.war und rr.war herunterladen (falls nicht im Cache)
        if: steps.compare.outputs.changed == 'true'
        run: |
          mkdir -p tools
          ec=tools/ebnf-convert-${{ steps.tool_versions.outputs.ec_version }}.war
          rr=tools/rr-${{ steps.tool_versions.outputs.rr_version }}.war
          [ -f "$ec" ] || curl -sfL -o "$ec" \
            "https://repo1.maven.org/maven2/de/bottlecaps/ebnf-convert/ebnf-convert-webapp/${{ steps.tool_versions.outputs.ec_version }}/ebnf-convert-webapp-${{ steps.tool_versions.outputs.ec_version }}.war"
          [ -f "$rr" ] || curl -sfL -o "$rr" \
            "https://repo1.maven.org/maven2/de/bottlecaps/rr/rr-webapp/${{ steps.tool_versions.outputs.rr_version }}/rr-webapp-${{ steps.tool_versions.outputs.rr_version }}.war"
          ln -sf "$(basename "$ec")" tools/ebnf-convert.war
          ln -sf "$(basename "$rr")" tools/rr.war

      - name: ANTLR4-Grammatiken mit kebnf erzeugen
        if: steps.compare.outputs.changed == 'true'
        run: |
          mkdir -p grammar
          kerml_file=$(find ~/.cache/kebnf -iname '*kerml*.kebnf' | head -n1)
          sysml_file=$(find ~/.cache/kebnf -iname '*sysml*.kebnf' | head -n1)
          echo "KerML-Datei: $kerml_file"
          echo "SysML-Datei: $sysml_file"
          kebnf "$kerml_file" --format antlr4 -o grammar/KerML.g4
          kebnf "$kerml_file" "$sysml_file" --format antlr4 -o grammar/SysML.g4

      - name: Datum der Original-KEBNF-Datei ermitteln
        if: steps.compare.outputs.changed == 'true'
        id: spec_date
        run: |
          date=$(curl -s "https://api.github.com/repos/Systems-Modeling/SysML-v2-Release/commits?path=bnf/SysML-textual-bnf.kebnf&per_page=1" | jq -r '.[0].commit.committer.date')
          echo "date=$date" >> "$GITHUB_OUTPUT"

      - name: Railroad-Diagramme erzeugen
        if: steps.compare.outputs.changed == 'true'
        run: |
          cd grammar
          mkdir -p ../site
          java -jar ../tools/ebnf-convert.war KerML.g4 > kerml.ebnf
          java -jar ../tools/ebnf-convert.war SysML.g4 > sysml.ebnf
          java -jar ../tools/rr.war -html -suppressebnf -out:"../site/KerML 1 - textual notation.html" kerml.ebnf
          java -jar ../tools/rr.war -html -suppressebnf -color:#7B83DF -out:"../site/SysML 2 - textual notation.html" sysml.ebnf
          sed -i "0,/<title>[^<]*<\/title>/s##<title>KerML</title>#" "../site/KerML 1 - textual notation.html"
          sed -i "0,/<title>[^<]*<\/title>/s##<title>SysML</title>#" "../site/SysML 2 - textual notation.html"

      - name: Datum oben rechts einfügen
        if: steps.compare.outputs.changed == 'true'
        run: |
          readable_date=$(LC_TIME=C date -u -d "${{ steps.spec_date.outputs.date }}" +"%B %Y")
          info="<div style=\"text-align:right;margin-bottom:1em;font-family:sans-serif;font-size:0.85em;color:#666;\">Status: ${readable_date}</div>"
          sed -i "0,/<body[^>]*>/s||&${info}|" "site/KerML 1 - textual notation.html"
          sed -i "0,/<body[^>]*>/s||&${info}|" "site/SysML 2 - textual notation.html"

      - name: last_spec_hash.txt aktualisieren und committen
        if: steps.compare.outputs.changed == 'true'
        run: |
          echo "${{ steps.fetch.outputs.hash }}" > last_spec_hash.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_spec_hash.txt
          git diff --staged --quiet || git commit -m "Update KerML/SysML v2 spec snapshot to ${{ steps.fetch.outputs.hash }}"
          git push

      - name: Pages vorbereiten
        if: steps.compare.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Artefakt hochladen
        if: steps.compare.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: needs.check-and-build.outputs.changed == 'true'
    needs: check-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
